<!DOCTYPE html>
<html lang="fr">
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Patatoïde — SDIS 66</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    :root {
      --bg: #0f1729;
      --card: #161f38;
      --text: #e0e8ff;
      --muted: #8899bb;
      --accent: #5b9aff;
      --ok: #3ddc84;
      --warn: #ffb74d;
      --danger: #ff5252;
      --border: rgba(255,255,255,.08);
      --radius: 14px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* ── HEADER ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 20px;
      background: rgba(22,31,56,.95);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      z-index: 1000;
    }
    .brand { display: flex; align-items: center; gap: 12px; }
    .brand-icon {
      width: 36px; height: 36px; border-radius: 10px;
      background: linear-gradient(135deg, #5b9aff, #3ddc84);
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
    }
    .brand h1 { font-size: 18px; font-weight: 800; letter-spacing: -0.5px; }
    .brand h1 span { color: var(--accent); }
    .brand-sub { font-size: 11px; color: var(--muted); margin-top: -2px; }

    .controls { display: flex; align-items: center; gap: 8px; }
    .toggle-group {
      display: flex;
      background: rgba(255,255,255,.04);
      border: 1px solid var(--border);
      border-radius: 999px;
      overflow: hidden;
    }
    .toggle-btn {
      padding: 7px 16px;
      font-size: 12px;
      font-weight: 700;
      border: none;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      transition: all .2s;
      white-space: nowrap;
    }
    .toggle-btn:hover { color: var(--text); background: rgba(255,255,255,.04); }
    .toggle-btn.active {
      background: linear-gradient(135deg, rgba(91,154,255,.25), rgba(61,220,132,.15));
      color: #fff;
      box-shadow: inset 0 0 0 1px rgba(91,154,255,.4);
    }
    .coverage-select {
      padding: 7px 12px; border-radius: 999px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,.04);
      color: var(--text);
      font-size: 12px; font-weight: 600;
      cursor: pointer; outline: none;
    }
    .coverage-select option { background: var(--bg); color: var(--text); }

    /* ── LAYOUT ── */
    .main-layout {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── MAP ── */
    #map {
      flex: 1;
      z-index: 1;
    }
    .leaflet-container { background: #0a0f1e !important; }

    /* ── SIDEBAR ── */
    .sidebar {
      width: 380px;
      background: var(--card);
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      flex-shrink: 0;
      z-index: 500;
    }
    .sidebar-head {
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
      background: rgba(0,0,0,.15);
    }
    .sidebar-head h2 { font-size: 14px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; color: var(--accent); }
    .sidebar-body {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
    }
    .sidebar-body::-webkit-scrollbar { width: 4px; }
    .sidebar-body::-webkit-scrollbar-track { background: transparent; }
    .sidebar-body::-webkit-scrollbar-thumb { background: rgba(255,255,255,.1); border-radius: 2px; }

    /* ── SUMMARY CARDS ── */
    .summary-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 14px;
    }
    .summary-card {
      background: rgba(255,255,255,.03);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 12px;
      text-align: center;
    }
    .summary-card .val { font-size: 26px; font-weight: 800; line-height: 1; }
    .summary-card .lbl { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-top: 4px; }
    .summary-card.full { grid-column: 1 / -1; }

    /* ── ZONE LIST ── */
    .zone-item {
      background: rgba(255,255,255,.02);
      border: 1px solid var(--border);
      border-radius: 10px;
      margin-bottom: 8px;
      overflow: hidden;
      transition: border-color .2s;
      cursor: pointer;
    }
    .zone-item:hover { border-color: rgba(91,154,255,.3); }
    .zone-item.highlight { border-color: var(--accent); box-shadow: 0 0 20px rgba(91,154,255,.15); }
    .zone-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 12px;
    }
    .zone-name { font-weight: 700; font-size: 13px; display: flex; align-items: center; gap: 8px; }
    .zone-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .zone-isp { font-size: 22px; font-weight: 800; color: var(--accent); }
    .zone-details {
      padding: 0 12px 10px;
      font-size: 11px;
      color: var(--muted);
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 4px 12px;
    }
    .zone-details span { display: flex; justify-content: space-between; }
    .zone-details b { color: var(--text); }
    .zone-cis-list {
      padding: 6px 12px 10px;
      font-size: 10px;
      color: var(--muted);
      border-top: 1px solid var(--border);
    }

    /* ── LEGEND ── */
    .legend-box {
      padding: 12px;
      border-top: 1px solid var(--border);
      background: rgba(0,0,0,.15);
      flex-shrink: 0;
    }
    .legend-title { font-size: 10px; color: var(--muted); text-transform: uppercase; margin-bottom: 6px; font-weight: 700; }
    .legend-row { display: flex; align-items: center; gap: 8px; font-size: 11px; margin-bottom: 3px; }
    .legend-swatch { width: 18px; height: 12px; border-radius: 3px; border: 1px solid rgba(255,255,255,.1); flex-shrink: 0; }

    /* ── FORMULE BOX ── */
    .formula-box {
      padding: 10px 12px;
      margin-bottom: 12px;
      background: rgba(91,154,255,.06);
      border: 1px solid rgba(91,154,255,.15);
      border-radius: 10px;
      font-size: 11px;
      line-height: 1.6;
      color: var(--muted);
    }
    .formula-box b { color: var(--text); }
    .formula-box code {
      background: rgba(255,255,255,.06);
      padding: 1px 5px;
      border-radius: 4px;
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 10px;
      color: var(--ok);
    }

    /* ── MAP LABELS ── */
    .zone-label {
      background: rgba(15,23,41,.92);
      border: 1px solid rgba(91,154,255,.4);
      border-radius: 8px;
      padding: 6px 10px;
      text-align: center;
      white-space: nowrap;
      box-shadow: 0 4px 16px rgba(0,0,0,.4);
      pointer-events: none;
    }
    .zone-label .zl-name { font-size: 11px; font-weight: 700; color: #fff; }
    .zone-label .zl-isp { font-size: 18px; font-weight: 900; color: var(--accent); line-height: 1.1; }
    .zone-label .zl-sub { font-size: 9px; color: var(--muted); }
    .zone-label.warn-label { border-color: rgba(255,183,77,.5); }
    .zone-label.warn-label .zl-isp { color: var(--warn); }
    .zone-label.danger-label { border-color: rgba(255,82,82,.4); }
    .zone-label.danger-label .zl-isp { color: var(--danger); }
    .cis-tooltip {
      background: rgba(15,23,41,.95) !important;
      border: 1px solid var(--border) !important;
      border-radius: 8px !important;
      padding: 8px 12px !important;
      color: var(--text) !important;
      font-size: 12px !important;
      box-shadow: 0 4px 16px rgba(0,0,0,.4) !important;
    }

    @media (max-width: 900px) {
      .sidebar { width: 100%; position: fixed; bottom: 0; height: 50vh; border-left: none; border-top: 1px solid var(--border); }
      #map { height: 50vh; }
      .main-layout { flex-direction: column; }
    }
  </style>
</head>

// ═══════════════════════════════════════════════════
// MODÈLE ISP
// ═══════════════════════════════════════════════════
const H_MOIS = 730; // heures dans un mois
const BASE_H = 36;  // heures/mois par ISP
const DOUBLE_H = 72; // heures pour les ISP qui doublent
const DUREE_INTER = 2; // heures moyennes par intervention ISP

/**
 * Heures totales mensuelles pour n ISP :
 * floor(n/5) font 72h, le reste fait 36h
 */
function getTotalHours(n) {
  const nDouble = Math.floor(n / 5);
  const nSimple = n - nDouble;
  return nSimple * BASE_H + nDouble * DOUBLE_H;
}

/**
 * ISP minimum pour couvrir une zone à X% en tenant compte de la charge.
 * Modèle : heures_dispo(n) ≥ couverture × H_mois + interventions × durée
 * → On soustrait les heures "consommées" par les interventions
 */
function calcISP(coverageTarget, interventionsMois) {
  const needed = coverageTarget * H_MOIS + interventionsMois * DUREE_INTER;
  for (let n = 1; n <= 200; n++) {
    if (getTotalHours(n) >= needed) return n;
  }
  return 200;
}

/**
 * Pourcentage de couverture effective pour n ISP + charge
 */
function getCoverage(n, interventionsMois) {
  const available = getTotalHours(n) - interventionsMois * DUREE_INTER;
  return Math.min(1, Math.max(0, available / H_MOIS));
}

// ═══════════════════════════════════════════════════
// CARTE LEAFLET
// ═══════════════════════════════════════════════════
let map, currentT = 20, zoneLayers = [], zoneLabels = [], cisMarkers = [];

function initMap() {
  map = L.map('map', {
    center: [42.60, 2.55],
    zoom: 10,
    minZoom: 9,
    maxZoom: 14,
    zoomControl: true
  });

  // Tiles sombres
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    attribution: '© OpenStreetMap © CARTO',
    subdomains: 'abcd',
    maxZoom: 19
  }).addTo(map);

  // Marqueurs CIS
  CIS.forEach(c => {
    const grpColor = c.grp === 'Nord' ? '#5b9aff' : c.grp === 'Ouest' ? '#ab47bc' : '#ffa726';
    const marker = L.circleMarker([c.lat, c.lng], {
      radius: 5,
      fillColor: grpColor,
      color: '#fff',
      weight: 1,
      fillOpacity: 0.85
    }).addTo(map);
    marker.bindTooltip(
      `<b>${c.nom}</b><br>Groupement ${c.grp}<br>Cible ISP : ${c.cible}`,
      { className: 'cis-tooltip', direction: 'top', offset: [0, -8] }
    );
    cisMarkers.push(marker);
  });

  updateAll();
}

function setT(t) {
  currentT = t;
  document.querySelectorAll('.toggle-btn').forEach(b => {
    b.classList.toggle('active', parseInt(b.dataset.t) === t);
  });
  updateAll();
}

function updateAll() {
  const cov = parseFloat(document.getElementById('coverageSelect').value);

  // Nettoyer les anciens
  zoneLayers.forEach(l => map.removeLayer(l));
  zoneLabels.forEach(l => map.removeLayer(l));
  zoneLayers = [];
  zoneLabels = [];

  const zones = ZONES[currentT];
  let totalISP = 0;
  let totalCIS = 0;
  const zoneResults = [];

  zones.forEach((z, i) => {
    const isp = calcISP(cov, z.intMois);
    const covEff = getCoverage(isp, z.intMois);
    const hours = getTotalHours(isp);
    const nDouble = Math.floor(isp / 5);
    totalISP += isp;
    totalCIS += z.cisIds.length;

    // Couleur du polygone selon besoin ISP
    let fillColor, strokeColor, labelClass;
    if (isp <= 15) {
      fillColor = 'rgba(61,220,132,.15)';
      strokeColor = 'rgba(61,220,132,.6)';
      labelClass = '';
    } else if (isp <= 20) {
      fillColor = 'rgba(255,183,77,.12)';
      strokeColor = 'rgba(255,183,77,.5)';
      labelClass = 'warn-label';
    } else {
      fillColor = 'rgba(255,82,82,.10)';
      strokeColor = 'rgba(255,82,82,.4)';
      labelClass = 'danger-label';
    }

    // Polygone
    const poly = L.polygon(z.poly, {
      color: strokeColor,
      weight: 2,
      fillColor: fillColor,
      fillOpacity: 1,
      dashArray: '6 4'
    }).addTo(map);
    zoneLayers.push(poly);

    // Centroïde
    const center = poly.getBounds().getCenter();

    // Label
    const labelHtml = `
      <div class="zone-label ${labelClass}">
        <div class="zl-name">${z.nom}</div>
        <div class="zl-isp">${isp} ISP</div>
        <div class="zl-sub">${z.cisIds.length} CIS · ${z.intMois} inter/mois</div>
      </div>`;
    const label = L.marker(center, {
      icon: L.divIcon({
        html: labelHtml,
        className: '',
        iconSize: null,
        iconAnchor: [70, 30]
      }),
      interactive: false
    }).addTo(map);
    zoneLabels.push(label);

    zoneResults.push({
      ...z,
      isp,
      covEff,
      hours,
      nDouble,
      fillColor: strokeColor
    });
  });

  renderSidebar(zoneResults, totalISP, totalCIS, cov);
}

// ═══════════════════════════════════════════════════
// SIDEBAR
// ═══════════════════════════════════════════════════
function renderSidebar(zones, totalISP, totalCIS, coverageTarget) {
  document.getElementById('sidebarTitle').textContent = `Synthèse T+${currentT}`;
  const body = document.getElementById('sidebarBody');

  // Somme des heures
  const totalH = zones.reduce((s, z) => s + z.hours, 0);
  const totalInter = zones.reduce((s, z) => s + z.intMois, 0);

  let html = `
    <div class="summary-grid">
      <div class="summary-card"><div class="val" style="color:var(--accent);">${totalISP}</div><div class="lbl">ISP nécessaires</div></div>
      <div class="summary-card"><div class="val" style="color:var(--ok);">${zones.length}</div><div class="lbl">Zones T+${currentT}</div></div>
      <div class="summary-card"><div class="val">${totalCIS}</div><div class="lbl">CIS couverts</div></div>
      <div class="summary-card"><div class="val">${totalInter}</div><div class="lbl">Inter. ISP/mois</div></div>
      <div class="summary-card full"><div class="val" style="font-size:20px;">${totalH.toLocaleString('fr-FR')} h/mois</div><div class="lbl">Total heures ISP dispo</div></div>
    </div>

    <div class="formula-box">
      <b>Règle de calcul :</b><br>
      Chaque ISP fait <code>${BASE_H}h/mois</code>. Pour 5 ISP, 1 fait <code>${DOUBLE_H}h</code>.<br>
      Objectif <code>${Math.round(coverageTarget*100)}%</code> couverture temps + charge interventions.<br>
      <b>Formule :</b> <code>heures(n) ≥ ${Math.round(coverageTarget*100)}% × 730h + inter × ${DUREE_INTER}h</code>
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:12px;">
      ${[10,20,30].map(t => {
        const zz = ZONES[t];
        let tot = 0;
        zz.forEach(z => tot += calcISP(coverageTarget, z.intMois));
        const isActive = t === currentT;
        return `<div style="text-align:center;padding:8px;border-radius:8px;border:1px solid ${isActive ? 'var(--accent)' : 'var(--border)'};background:${isActive ? 'rgba(91,154,255,.1)' : 'rgba(255,255,255,.02)'}; cursor:pointer;" onclick="setT(${t})">
          <div style="font-size:10px;color:var(--muted);">T+${t}</div>
          <div style="font-size:20px;font-weight:800;color:${isActive ? 'var(--accent)' : 'var(--text)'};">${tot}</div>
          <div style="font-size:10px;color:var(--muted);">${zz.length} zones</div>
        </div>`;
      }).join('')}
    </div>
  `;

  // Zone list
  zones.sort((a, b) => b.isp - a.isp);
  zones.forEach(z => {
    const cisNames = z.cisIds.map(id => {
      const c = CIS.find(cc => cc.id === id);
      return c ? c.nom : id;
    }).join(', ');

    html += `
      <div class="zone-item" onmouseenter="highlightZone('${z.nom}')" onmouseleave="unhighlightZone()">
        <div class="zone-head">
          <div class="zone-name">
            <div class="zone-dot" style="background:${z.fillColor};"></div>
            ${z.nom}
          </div>
          <div class="zone-isp">${z.isp}</div>
        </div>
        <div class="zone-details">
          <span>CIS <b>${z.cisIds.length}</b></span>
          <span>Inter/mois <b>${z.intMois}</b></span>
          <span>Heures dispo <b>${z.hours}h</b></span>
          <span>Couv. effective <b>${Math.round(z.covEff*100)}%</b></span>
          <span>Dont ×72h <b>${z.nDouble} ISP</b></span>
          <span>Dont ×36h <b>${z.isp - z.nDouble} ISP</b></span>
        </div>
        <div class="zone-cis-list">📍 ${cisNames}</div>
      </div>`;
  });

  body.innerHTML = html;
}

function highlightZone(nom) {
  document.querySelectorAll('.zone-item').forEach(el => {
    el.classList.toggle('highlight', el.querySelector('.zone-name').textContent.trim().includes(nom));
  });
}
function unhighlightZone() {
  document.querySelectorAll('.zone-item').forEach(el => el.classList.remove('highlight'));
}
